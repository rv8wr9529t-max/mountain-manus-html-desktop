<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Dew - 个人小站</title>
    <style>
        :root {
            --accent-color: #00d4ff;
            --accent-pink: #ff1493;
            --dark-bg: #0a0d12;
            --darker-bg: #050810;
            --card-bg: rgba(20, 25, 40, 0.7);
            --text-light: #e8e8e8;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #050810;
            color: var(--text-light);
            font-family: 'Courier New', 'Segoe UI', Roboto, sans-serif;
            position: relative;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== 背景系统 ========== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(180deg, #050810 0%, #0a0d12 50%, #050810 100%);
        }

        svg#starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 20, 147, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(100, 50, 200, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* ========== 头部 ========== */
        header {
            text-align: center;
            padding: 80px 20px 50px;
            position: relative;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 
                0 0 40px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.2);
            animation: logoFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.2));
        }

        @keyframes logoFloat {
            0%, 100% { 
                transform: translateY(0);
                box-shadow: 
                    0 0 40px rgba(0, 212, 255, 0.3),
                    inset 0 0 20px rgba(0, 212, 255, 0.1);
            }
            50% { 
                transform: translateY(-15px);
                box-shadow: 
                    0 0 60px rgba(0, 212, 255, 0.5),
                    inset 0 0 30px rgba(0, 212, 255, 0.2);
            }
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 15px;
            animation: logoGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
            text-shadow: 
                0 0 30px rgba(0, 212, 255, 0.2),
                0 0 60px rgba(255, 20, 147, 0.1);
        }

        @keyframes logoGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
            }
            50% { 
                filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.5));
            }
        }

        .tagline {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-transform: uppercase;
            opacity: 0.7;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        /* ========== 倒计时 ========== */
        .countdown-section {
            margin: 80px 0;
        }

        .countdown-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .countdown-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                rgba(0, 212, 255, 0.2),
                rgba(255, 20, 147, 0.1),
                rgba(0, 212, 255, 0.2)
            );
            animation: rotate 15s linear infinite;
            opacity: 0.05;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .countdown-box > * {
            position: relative;
            z-index: 1;
        }

        .countdown-title {
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .timer-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 25px;
            margin-bottom: 20px;
        }

        .time-unit {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 20px 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .time-unit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .time-unit:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.15);
        }

        .time-number {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent-color);
            display: block;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            letter-spacing: 1px;
        }

        .time-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        /* ========== 按钮区域 ========== */
        .buttons-section {
            margin: 100px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 0 20px;
        }

        .btn-card {
            position: relative;
            height: 320px;
            cursor: pointer;
            perspective: 1200px;
        }

        .btn-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.320, 1);
            transform-style: preserve-3d;
        }

        .btn-card:hover .btn-inner {
            transform: rotateY(8deg) rotateX(3deg);
        }

        .btn-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 30px;
            text-align: center;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .btn-front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(0, 212, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-card:hover .btn-front {
            background: rgba(20, 25, 40, 0.9);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 
                0 12px 48px rgba(0, 212, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .btn-icon {
            font-size: 3.5rem;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.2));
        }

        .btn-card:nth-child(1) .btn-icon {
            animation-delay: 0s;
        }

        .btn-card:nth-child(2) .btn-icon {
            animation-delay: 0.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .btn-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-light);
            text-transform: uppercase;
            position: relative;
            z-index: 3;
        }

        .btn-card:hover .btn-title {
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .btn-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 3;
        }

        .btn-link {
            margin-top: auto;
            padding: 12px 35px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 20, 147, 0.1));
            color: var(--accent-color);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.1);
            text-decoration: none;
            display: inline-block;
        }

        .btn-link:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(255, 20, 147, 0.2));
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-link:active {
            transform: translateY(0);
        }

        /* ========== 页脚 ========== */
        footer {
            margin-top: 120px;
            padding: 60px 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
        }

        .footer-content {
            position: relative;
            z-index: 1;
        }

        .footer-info {
            line-height: 2;
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .footer-info a {
            color: var(--accent-color);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        .footer-info a:hover {
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .copyright {
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            margin-top: 20px;
        }

        /* ========== AI 助手悬浮球（带关闭按钮） ========== */
        .ai-float-wrapper {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 9999;
            display: block; /* 默认显示，由JS控制隐藏/显示 */
        }

        .ai-float-btn {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00d4ff 0%, #00a1ff 50%, #0088ff 100%);
            border: 3px solid #00ffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 
                0 0 50px #00d4ff,
                0 0 100px rgba(0, 212, 255, 0.6),
                0 0 150px rgba(0, 212, 255, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
            animation: floatBubble 2.5s ease-in-out infinite, megaPulse 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative; /* 为右上角X提供参考 */
        }

        /* 小球右上角的关闭按钮 */
        .ai-float-close {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 26px;
            height: 26px;
            background: rgba(255, 20, 147, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 0 20px #ff1493, 0 0 40px rgba(255,20,147,0.5);
            transition: all 0.2s ease;
            line-height: 1;
            padding-bottom: 2px; /* 微调X垂直居中 */
        }

        .ai-float-close:hover {
            transform: scale(1.2);
            background: #ff1493;
            box-shadow: 0 0 30px #ff1493, 0 0 60px rgba(255,20,147,0.8);
        }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes megaPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 50px #00d4ff,
                    0 0 100px rgba(0, 212, 255, 0.6),
                    0 0 150px rgba(0, 212, 255, 0.4),
                    inset 0 0 30px rgba(255, 255, 255, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 80px #00d4ff,
                    0 0 150px rgba(0, 212, 255, 0.8),
                    0 0 200px rgba(0, 212, 255, 0.6),
                    inset 0 0 50px rgba(255, 255, 255, 0.5);
            }
        }

        .ai-float-btn:hover {
            transform: scale(1.15);
            box-shadow: 
                0 0 100px #00d4ff,
                0 0 180px rgba(0, 212, 255, 0.8),
                0 0 250px rgba(0, 212, 255, 0.6),
                inset 0 0 50px rgba(255, 255, 255, 0.4);
        }

        .ai-float-btn-text {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-shadow: 
                0 0 20px #00d4ff,
                0 0 40px rgba(0, 212, 255, 0.8);
            letter-spacing: 2px;
        }

        /* ========== AI 对话框（增加密码层及X） ========== */
        .ai-modal {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 400px;
            height: 600px;
            background: var(--card-bg);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            z-index: 9998;
            box-shadow: 
                0 20px 80px rgba(0, 212, 255, 0.4),
                0 0 60px rgba(0, 212, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            overflow: hidden;
        }

        .ai-modal.active {
            display: flex;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), rgba(255, 20, 147, 0.05));
        }

        .ai-modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ai-modal-close {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-modal-close:hover {
            transform: rotate(90deg);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .ai-modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ai-message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message.user {
            justify-content: flex-end;
        }

        .ai-message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .ai-message.user .ai-message-bubble {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 20, 147, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--text-light);
        }

        .ai-message.assistant .ai-message-bubble {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--text-light);
        }

        .ai-message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .ai-message.user .ai-message-avatar {
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid rgba(255, 20, 147, 0.3);
            color: var(--accent-pink);
        }

        .ai-message.assistant .ai-message-avatar {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-color);
        }

        .ai-modal-input-area {
            padding: 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .ai-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-light);
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .ai-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .ai-input::placeholder {
            color: var(--text-muted);
        }

        .ai-send-btn {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(255, 20, 147, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-color);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .ai-send-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(255, 20, 147, 0.3));
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .ai-send-btn:active {
            transform: scale(0.95);
        }

        .ai-clear-btn {
            background: rgba(255, 20, 147, 0.1);
            border: 1px solid rgba(255, 20, 147, 0.2);
            color: var(--accent-pink);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .ai-clear-btn:hover {
            background: rgba(255, 20, 147, 0.2);
            border-color: rgba(255, 20, 147, 0.4);
        }

        /* 密码输入层（带X） */
        .ai-password-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 16, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            border-radius: 20px;
            gap: 20px;
            padding: 20px;
        }

        .ai-password-overlay.hidden {
            display: none;
        }

        /* 密码层自带的关闭按钮（位于右上角） */
        .password-layer-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: rgba(255, 20, 147, 0.7);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            z-index: 10002;
            box-shadow: 0 0 20px #ff1493;
            transition: all 0.2s;
            line-height: 1;
        }

        .password-layer-close:hover {
            transform: scale(1.15);
            background: #ff1493;
            box-shadow: 0 0 30px #ff1493, 0 0 60px rgba(255,20,147,0.8);
        }

        .ai-password-title {
            color: var(--accent-color);
            font-size: 1.4rem;
            text-shadow: 0 0 15px rgba(0,212,255,0.5);
            margin-top: 10px;
        }

        .ai-password-input {
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--accent-color);
            border-radius: 40px;
            padding: 12px 20px;
            width: 80%;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        .ai-password-input:focus {
            box-shadow: 0 0 30px var(--accent-color);
        }

        .ai-password-submit {
            background: linear-gradient(135deg, #00d4ff, #ff1493);
            border: none;
            border-radius: 40px;
            padding: 12px 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #00d4ff;
            transition: all 0.3s;
        }

        .ai-password-submit:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff1493;
        }

        .ai-password-error {
            color: #ff6b6b;
            font-size: 0.9rem;
            height: 20px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .logo-img {
                width: 90px;
                height: 90px;
                margin-bottom: 20px;
            }

            .logo {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }

            header {
                padding: 60px 20px 40px;
            }

            .countdown-title {
                font-size: 1.3rem;
            }

            .time-number {
                font-size: 2.2rem;
            }

            .timer-display {
                gap: 15px;
            }

            .time-unit {
                padding: 15px 10px;
            }

            .buttons-section {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 0;
            }

            .btn-card {
                height: 280px;
            }

            .btn-title {
                font-size: 1.3rem;
            }

            .btn-icon {
                font-size: 2.8rem;
            }

            .countdown-box {
                padding: 40px 20px;
            }

            .ai-modal {
                width: 90vw;
                height: 70vh;
                max-width: 400px;
                bottom: 90px;
                right: 10px;
            }

            .ai-float-wrapper {
                bottom: 20px;
                right: 20px;
            }

            .ai-float-btn {
                width: 80px;
                height: 80px;
            }

            .ai-float-btn-text {
                font-size: 2.2rem;
            }

            .ai-float-close {
                width: 22px;
                height: 22px;
                font-size: 16px;
                top: -4px;
                right: -4px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景系统 -->
    <div class="bg-container"></div>
    <svg id="starfield" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice"></svg>
    <div class="glow-overlay"></div>

    <!-- 主内容 -->
    <div class="container">
        <!-- 头部 -->
        <header>
            <img src="https://mountainriver.nekoweb.org/IMG_0674.webp" alt="Mountain Dew Logo" class="logo-img">
            <h1 class="logo">Mountain Dew</h1>
            <p class="tagline">个人小站 · 2025-2026</p>
        </header>

        <!-- 倒计时 -->
        <section class="countdown-section">
            <div class="countdown-box">
                <div class="countdown-title">📅 2026 中考倒计时</div>
                <div class="timer-display" id="countdown">
                    <div class="time-unit">
                        <span class="time-number" id="days">00</span>
                        <span class="time-label">天</span>
                    </div>
                    <div class="time-unit">
                        <span class="time-number" id="hours">00</span>
                        <span class="time-label">时</span>
                    </div>
                    <div class="time-unit">
                        <span class="time-number" id="minutes">00</span>
                        <span class="time-label">分</span>
                    </div>
                    <div class="time-unit">
                        <span class="time-number" id="seconds">00</span>
                        <span class="time-label">秒</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 按钮区域 -->
        <section class="buttons-section">
            <div class="btn-card">
                <div class="btn-inner">
                    <div class="btn-front">
                        <div class="btn-icon">🤖</div>
                        <div class="btn-title">Mountain AI</div>
                        <div class="btn-subtitle">AI 内容平台</div>
                        <a href="https://mountainai-kpfbrstk.manus.space/" target="_blank" class="btn-link">进入</a>
                    </div>
                </div>
            </div>

            <div class="btn-card">
                <div class="btn-inner">
                    <div class="btn-front">
                        <div class="btn-icon">📝</div>
                        <div class="btn-title">Mountain Blog</div>
                        <div class="btn-subtitle">博客分享平台</div>
                        <a href="https://mountblog-tthughwq.manus.space/" target="_blank" class="btn-link">进入</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                公众号: <strong>mountaindew</strong> | 
                邮箱: <a href="mailto:mountain0708@outlook.com">mountain0708@outlook.com</a> | 
                官网: <a href="https://1007080.xyz" target="_blank">1007080.xyz</a>
            </div>
            <div class="copyright">
                &copy; MountainAI 2025-2026
            </div>
        </div>
    </footer>

    <!-- AI 助手悬浮球（带右上角小叉） -->
    <div class="ai-float-wrapper" id="aiFloatWrapper">
        <div class="ai-float-btn" id="aiFloatBtn">
            <div class="ai-float-btn-text">AI</div>
        </div>
        <div class="ai-float-close" id="aiFloatClose">✕</div>
    </div>

    <!-- AI 对话框（密码层自带X） -->
    <div class="ai-modal" id="aiModal">
        <!-- 密码覆盖层（默认显示），带右上角X -->
        <div class="ai-password-overlay" id="passwordOverlay">
            <div class="password-layer-close" id="passwordLayerClose">✕</div>
            <div class="ai-password-title">请输入访问密码</div>
            <input type="password" class="ai-password-input" id="passwordInput" placeholder="密码" autocomplete="off">
            <button class="ai-password-submit" id="passwordSubmit">进入</button>
            <div class="ai-password-error" id="passwordError"></div>
        </div>

        <!-- 正常对话框内容（初始隐藏） -->
        <div style="display: flex; flex-direction: column; height: 100%; width: 100%;" id="chatInterface" class="hidden">
            <div class="ai-modal-header">
                <div class="ai-modal-title">小M - AI 助手</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="ai-clear-btn" id="clearBtn">清空</button>
                    <button class="ai-modal-close" id="closeBtn">✕</button>
                </div>
            </div>
            <div class="ai-modal-content" id="chatContent"></div>
            <div class="ai-modal-input-area">
                <input 
                    type="text" 
                    class="ai-input" 
                    id="aiInput" 
                    placeholder="输入您的问题..."
                    autocomplete="off"
                >
                <button class="ai-send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ========== SVG 星空生成 ==========
        const svg = document.getElementById('starfield');
        const starCount = 200;

        function createStars() {
            svg.innerHTML = '';
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `
                @keyframes twinkle {
                    0%, 100% { opacity: 0.3; }
                    50% { opacity: 1; }
                }
                .star {
                    animation: twinkle var(--duration) infinite;
                    animation-delay: var(--delay);
                }
            `;
            defs.appendChild(style);
            svg.appendChild(defs);

            for (let i = 0; i < starCount; i++) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                const x = Math.random() * 1920;
                const y = Math.random() * 1080;
                const radius = Math.random() * 1.5;
                const duration = (Math.random() * 2 + 2) + 's';
                const delay = Math.random() * 3 + 's';

                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', radius);
                circle.setAttribute('fill', 'white');
                circle.setAttribute('class', 'star');
                circle.style.setProperty('--duration', duration);
                circle.style.setProperty('--delay', delay);

                svg.appendChild(circle);
            }
        }

        createStars();
        window.addEventListener('resize', createStars);

        // ========== 倒计时逻辑 ==========
        const targetDate = new Date('June 7, 2026 00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div style="grid-column: 1/-1; font-size: 2.2rem; color: var(--accent-color); text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); font-weight: 900;">祝中考顺利！🎉</div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // ========== AI 助手逻辑（上下文支持 + 密码层关闭按钮） ==========
        const aiFloatWrapper = document.getElementById('aiFloatWrapper');
        const aiFloatBtn = document.getElementById('aiFloatBtn');
        const aiFloatClose = document.getElementById('aiFloatClose');
        const aiModal = document.getElementById('aiModal');
        const closeBtn = document.getElementById('closeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const aiInput = document.getElementById('aiInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContent = document.getElementById('chatContent');
        
        // 密码相关元素
        const passwordOverlay = document.getElementById('passwordOverlay');
        const passwordInput = document.getElementById('passwordInput');
        const passwordSubmit = document.getElementById('passwordSubmit');
        const passwordError = document.getElementById('passwordError');
        const chatInterface = document.getElementById('chatInterface');
        const passwordLayerClose = document.getElementById('passwordLayerClose'); // 密码层X

        // API 密钥混淆（Base64 编码）
        const encodedKey = 'c2stOGU1NGVkYzg5YTA4NDUwODhmN2M0ODU4MTM4NTBjMmI=';
        const apiKey = atob(encodedKey);
        const apiUrl = 'https://api.mountain-ai.com/chat/completions';

        // 对话历史 (支持上下文)
        let conversationHistory = [];

        // 点击小球：隐藏小球并打开对话框
        aiFloatBtn.addEventListener('click', () => {
            aiFloatWrapper.style.display = 'none'; // 隐藏小球
            aiModal.classList.add('active');        // 打开对话框
            // 每次打开都重置密码界面（确保需要重新输入密码）
            resetPasswordLayer();
        });

        // 小球右上角小叉：隐藏小球（永久直到刷新），同时如果对话框开着也关闭
        aiFloatClose.addEventListener('click', (e) => {
            e.stopPropagation(); // 防止触发小球点击
            aiFloatWrapper.style.display = 'none'; // 隐藏小球
            // 如果对话框开着，也关闭它
            if (aiModal.classList.contains('active')) {
                aiModal.classList.remove('active');
                resetPasswordLayer();
            }
        });

        // 关闭对话框（内部X）：关闭对话框并显示小球
        closeBtn.addEventListener('click', () => {
            aiModal.classList.remove('active');
            aiFloatWrapper.style.display = 'block'; // 恢复显示
            resetPasswordLayer();
        });

        // 密码层X：关闭整个对话框，并显示小球
        passwordLayerClose.addEventListener('click', () => {
            aiModal.classList.remove('active');
            aiFloatWrapper.style.display = 'block';
            resetPasswordLayer();
        });

        // 重置密码层：显示密码覆盖，隐藏聊天界面，清空输入和错误，但不清空对话历史 (方便再次进入继续聊)
        function resetPasswordLayer() {
            passwordOverlay.classList.remove('hidden');
            chatInterface.classList.add('hidden');
            passwordInput.value = '';
            passwordError.textContent = '';
            // 注意：保留 conversationHistory 实现上下文持久化
        }

        // 密码验证
        function verifyPassword() {
            const pwd = passwordInput.value.trim();
            if (pwd === '1') {
                // 密码正确：隐藏覆盖，显示聊天界面
                passwordOverlay.classList.add('hidden');
                chatInterface.classList.remove('hidden');
                passwordError.textContent = '';
                // 聚焦输入框
                setTimeout(() => aiInput.focus(), 100);
            } else {
                passwordError.textContent = '密码错误，请重试';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        passwordSubmit.addEventListener('click', verifyPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyPassword();
            }
        });

        // 清空对话 (清空UI和历史)
        clearBtn.addEventListener('click', () => {
            conversationHistory = [];
            chatContent.innerHTML = '';
            aiInput.value = '';
            aiInput.focus();
        });

        // 发送消息 (支持上下文)
        async function sendMessage() {
            const message = aiInput.value.trim();
            if (!message) return;

            // 添加用户消息到界面
            addMessageToUI(message, 'user');
            aiInput.value = '';

            // 添加到对话历史
            conversationHistory.push({
                role: 'user',
                content: message
            });

            // 显示加载状态
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'ai-message assistant';
            loadingDiv.innerHTML = `
                <div class="ai-message-avatar">M</div>
                <div class="ai-message-bubble">正在思考中<span style="animation: blink 1s infinite;">...</span></div>
            `;
            chatContent.appendChild(loadingDiv);
            chatContent.scrollTop = chatContent.scrollHeight;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'mountain-ai-chat',
                        messages: conversationHistory,  // 发送完整历史实现上下文
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 错误: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // 移除加载状态
                loadingDiv.remove();

                // 添加 AI 回复到界面
                addMessageToUI(assistantMessage, 'assistant');

                // 添加到对话历史
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });

            } catch (error) {
                loadingDiv.remove();
                addMessageToUI(`错误: ${error.message}`, 'assistant');
            }

            aiInput.focus();
        }

        function addMessageToUI(message, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `ai-message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'ai-message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'M';

            const bubble = document.createElement('div');
            bubble.className = 'ai-message-bubble';
            bubble.textContent = message;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatContent.appendChild(messageDiv);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        // 发送按钮点击
        sendBtn.addEventListener('click', sendMessage);

        // Enter 键发送
        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 添加 CSS 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.3; }
            }
            .hidden { display: none !important; }
        `;
        document.head.appendChild(style);

        // 初始化时确保密码层显示，聊天界面隐藏
        resetPasswordLayer();
    </script>
</body>
